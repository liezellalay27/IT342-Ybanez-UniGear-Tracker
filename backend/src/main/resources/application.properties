# Server Configuration
server.port=${SERVER_PORT:8080}
spring.application.name=${APP_NAME:unigear-tracker}

# Database Configuration - Supabase PostgreSQL (Transaction Pooler - IPv4 Compatible)
# Load from .env file
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool Configuration
spring.datasource.hikari.connection-init-sql=SELECT 1
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
# Supabase/PgBouncer transaction poolers can fail with server-side prepared statements.
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preferQueryMode=simple

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# CORS Configuration
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidation12345678}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.admin.email=${ADMIN_EMAIL:admin@unigear.com}
app.admin.password=${ADMIN_PASSWORD:admin12345}
app.admin.bootstrap.enabled=${ADMIN_BOOTSTRAP_ENABLED:true}

# OAuth2 Configuration
app.oauth2.authorizedRedirectUri=${OAUTH2_REDIRECT_URI:http://localhost:3000}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB